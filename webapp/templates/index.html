<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Macros Calculator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="card">
    <h1>Macros Calculator</h1>
    <p class="subtitle">Enter your physical metrics to get your BMR, TDEE and daily macros.</p>

    <form action="{{ url_for('result') }}" method="post" class="form-grid">
      <label>
        <div style="display:flex; align-items:center; gap:24px;">
          <span style="min-width:55px;">Weight</span>
          <label class="radio-option"><input type="radio" name="weight_unit" value="kg" checked onchange="updateWeightPlaceholder()"> kg</label>
          <label class="radio-option"><input type="radio" name="weight_unit" value="lb" onchange="updateWeightPlaceholder()"> lbs</label>
        </div>
        <input type="number" step="0.1" name="weight" id="weight-input" value="" min="1" required placeholder="e.g. 70">
      </label>

      <label>
        <div style="display:flex; align-items:center; gap:24px;">
          <span style="min-width:55px;">Height</span>
          <label class="radio-option"><input type="radio" name="height_unit" value="cm" checked onchange="updateHeightPlaceholder()"> cms</label>
          <label class="radio-option"><input type="radio" name="height_unit" value="in" onchange="updateHeightPlaceholder()"> in</label>
        </div>
        <input type="number" step="0.1" name="height" id="height-input" value="" min="1" required placeholder="e.g. 175">
      </label>

      <div class="field-group">
        <label for="age">Age</label>
        <input id="age" type="number" name="age" value="" min="1" required placeholder="e.g. 25">
      </div>

      <div class="field-group">
        <label for="sex">Sex</label>
        <select id="sex" name="sex" required>
          <option value="" selected disabled>Select sex</option>
          <option value="1">Male</option>
          <option value="2">Female</option>
        </select>
      </div>

      <div class="field-group">
        <label for="bodyfat">Body Fat (%)</label>
        <input id="bodyfat" type="number" step="0.1" name="bodyfat" value="" min="1" max="70" required placeholder="e.g. 15">
      </div>

      <div class="field-group">
        <label for="trainingdays">Training Days / Week</label>
        <input id="trainingdays" type="number" name="trainingdays" value="" min="0" max="7" required placeholder="e.g. 3">
      </div>

      <div class="field-group">
        <label for="goal">Goal</label>
        <select id="goal" name="goal" required>
          <option value="" selected disabled>Select goal</option>
          <option value="1">Fat Loss</option>
          <option value="2">Maintenance</option>
          <option value="3">Muscle Gain</option>
        </select>
      </div>

      <div class="field-group">
        <label for="mul">Activity Level</label>
        <select id="mul" name="mul" required>
          <option value="" selected disabled>Select activity level</option>
          <option value="1.2">Sedentary — little/no exercise</option>
          <option value="1.375">Lightly Active — 1-3 days/week</option>
          <option value="1.55">Moderately Active — 3-5 days/week</option>
          <option value="1.725">Very Active — 6-7 days/week</option>
          <option value="1.9">Extra Active — hard daily training/physical job</option>
        </select>
      </div>

      <div id="deficit-wrapper" class="field-group" style="display: none;">
        <label for="deficit">Deficit (kcal)</label>
        <input id="deficit" type="number" name="deficit" min="0" step="1" placeholder="e.g. 300">
      </div>

      <button type="submit" class="submit-btn">Calculate</button>
    </form>
  </div>

  <script>
    const goalSelect = document.getElementById('goal');
    const deficitWrapper = document.getElementById('deficit-wrapper');
    const deficitInput = document.getElementById('deficit');
    const weightLabel = document.getElementById('weight-label');
    const heightLabel = document.getElementById('height-label');

    function updateUnitLabels() {
      const weightInputs = document.querySelectorAll('input[name="weight_unit"]');
      const heightInputs = document.querySelectorAll('input[name="height_unit"]');
      const weightUnit = Array.from(weightInputs).find((input) => input.checked)?.value || 'kg';
      const heightUnit = Array.from(heightInputs).find((input) => input.checked)?.value || 'cm';
      weightLabel.textContent = weightUnit === 'lb' ? 'Weight (lb)' : 'Weight (kg)';
      heightLabel.textContent = heightUnit === 'in' ? 'Height (in)' : 'Height (cm)';
    }

    function toggleDeficitField() {
      const show = goalSelect.value === '1';
      deficitWrapper.style.display = show ? 'block' : 'none';
      deficitInput.required = show;
      if (!show) {
        deficitInput.value = '';
      }
    }

    document.querySelectorAll('input[name="weight_unit"], input[name="height_unit"]').forEach((input) => {
      input.addEventListener('change', updateUnitLabels);
    });

    if (goalSelect) {
      goalSelect.addEventListener('change', toggleDeficitField);
      toggleDeficitField();
    }

    updateUnitLabels();
  </script>
</body>
</html>
